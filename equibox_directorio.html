<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EquiBox · Directorio</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1D2D5B;--cyan:#4aadd6;--cyan2:#1a6b8a;
  --text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --surface:#f8fafc;--white:#fff;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--indigo:#4f46e5;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--navy);padding:13px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(74,173,214,.2)}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:19px;font-weight:800;color:#e8f4fd;letter-spacing:-.3px}
.hdr-stats{margin-left:auto;display:flex;align-items:center;gap:12px}
.stat-pill{background:rgba(74,173,214,.15);border:1px solid rgba(74,173,214,.3);border-radius:20px;padding:5px 14px;display:flex;align-items:center;gap:6px}
.stat-n{font-size:15px;font-weight:800;color:var(--cyan)}
.stat-l{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.5px}
.btn-hdr{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-reset{background:rgba(220,38,38,.18);color:#fca5a5}.btn-reset:hover{background:rgba(220,38,38,.3)}
.btn-open{background:var(--cyan);color:var(--navy)}.btn-open:hover{background:#3a9dc6}
.btn-save{background:#16a34a;color:white}.btn-save:hover{background:#15803d}
/* SVC ASSIGN */
.svc-assign-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.svc-assign-label{font-size:11px;font-weight:700;color:#166534;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.svc-opt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.svc-opt-btn{padding:7px 14px;border-radius:8px;border:1.5px solid #d1fae5;background:white;color:#065f46;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s}
.svc-opt-btn:hover{background:#d1fae5;border-color:#34d399}
.svc-opt-active{background:#16a34a!important;color:white!important;border-color:#16a34a!important}
.svc-esp-row{align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.svc-esp-label{font-size:11px;font-weight:600;color:#475569}
.svc-esp-input{flex:1;min-width:160px;padding:6px 10px;border:1.5px solid #bae6fd;border-radius:7px;font-size:12px;outline:none;color:var(--text)}
.svc-esp-input:focus{border-color:#38bdf8}
.svc-esp-save{padding:6px 12px;border-radius:7px;border:none;background:#0369a1;color:white;font-size:11px;font-weight:700;cursor:pointer}
.svc-assign-status{font-size:12px;color:#047857;margin-top:6px}
.svc-clear-btn{padding:4px 10px;border-radius:6px;border:1px solid #fca5a5;background:transparent;color:#dc2626;font-size:11px;font-weight:600;cursor:pointer}
.svc-clear-btn:hover{background:#fee2e2}
/* SAVE TOAST */
#saveToast{position:fixed;bottom:28px;right:28px;background:#16a34a;color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999}
#saveToast.visible{opacity:1}

/* DIM TABS */
.dim-wrap{background:white;border-bottom:2px solid var(--border);padding:0 20px;display:flex;flex-shrink:0}
.dim-tab{padding:11px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.dim-tab:hover{color:var(--text);background:#f8fafc}
.dim-tab.active{color:var(--navy);border-bottom-color:var(--cyan)}
.dim-count{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;color:var(--muted)}
.dim-tab.active .dim-count{background:#e0f2fe;border-color:#bae6fd;color:#0369a1}

/* MAIN */
.main{display:flex;flex:1;min-height:0;overflow:hidden}

/* LEFT PANEL */
.left-panel{width:280px;min-width:280px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-search{padding:12px;border-bottom:1px solid var(--border)}
.panel-search input{width:100%;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;outline:none;color:var(--text);background:var(--surface)}
.panel-search input:focus{border-color:var(--cyan)}
.group-list{flex:1;overflow-y:auto;padding:8px 0}
.group-item{padding:9px 14px 9px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .12s;border-left:3px solid transparent;position:relative}
.group-item:hover{background:#f8fafc}
.group-item.active{background:#eff6ff;border-left-color:var(--cyan)}
.group-item.grp-hidden{opacity:.45}
.group-item.grp-hidden .group-name{text-decoration:line-through;color:var(--muted)}
.group-name{font-size:12.5px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-item.active .group-name{color:#1d4ed8}
.grp-custom-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);flex-shrink:0}
.grp-mod-dot{width:6px;height:6px;border-radius:50%;background:var(--indigo);flex-shrink:0;display:none}
.group-item.modified .grp-mod-dot{display:block}
.grp-counts{display:flex;align-items:center;gap:3px;flex-shrink:0}
.cnt-a{font-size:11px;font-weight:700;color:var(--green)}
.cnt-s{font-size:10px;color:#cbd5e1}
.cnt-t{font-size:11px;color:var(--muted)}
.grp-bar{width:34px;height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden;flex-shrink:0}
.grp-bar-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .3s}
.grp-action-btn{width:20px;height:20px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;opacity:0;transition:opacity .1s;padding:0;line-height:1}
.group-item:hover .grp-action-btn,.group-item.active .grp-action-btn{opacity:.7}

/* ADD GROUP BTN */
.add-grp-btn{margin:8px 12px;padding:8px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);width:calc(100% - 24px);transition:all .12s;display:flex;align-items:center;gap:5px;justify-content:center}
.add-grp-btn:hover{border-color:var(--cyan);color:var(--cyan2)}

/* DROPDOWN */
.grp-dropdown{position:fixed;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,.12);z-index:300;min-width:170px;overflow:hidden}
.grp-dd-item{padding:9px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.grp-dd-item:hover{background:#f8fafc}
.grp-dd-item.danger{color:var(--red)}.grp-dd-item.danger:hover{background:#fef2f2}

/* RIGHT PANEL */
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.right-head{background:white;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.right-head-info{flex:1;min-width:0}
.right-title{font-size:14px;font-weight:800;color:var(--text)}
.right-sub{font-size:11px;color:var(--muted);margin-top:1px}
.head-actions{display:flex;gap:6px;flex-shrink:0}
.bulk-btn{padding:5px 11px;border-radius:6px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .12s;display:flex;align-items:center;gap:5px}
.bulk-btn.act:hover{border-color:var(--green);color:var(--green)}
.bulk-btn.hide:hover{border-color:var(--red);color:var(--red)}
.btn-add-eq{padding:6px 13px;border-radius:7px;border:none;background:var(--indigo);color:white;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-add-eq:hover{background:#4338ca}

.checklist{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:3px}
.no-group{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px;flex-direction:column;gap:8px;opacity:.6}
.section-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:10px 2px 4px;display:flex;align-items:center;gap:6px}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* CHECK ITEM */
.check-item{background:white;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px;transition:all .12s;user-select:none}
.check-item.hidden-item{background:#fef2f2;border-color:#fecaca;opacity:.8}
.check-item.extra-item{border-color:#c7d2fe;background:#eef2ff}
.check-thumb{width:34px;height:34px;border-radius:6px;background:#f1f5f9;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check-thumb img{width:100%;height:100%;object-fit:contain;padding:2px}
.check-thumb svg{opacity:.35}
.check-info{flex:1;min-width:0}
.check-name{font-size:12.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hidden-item .check-name{color:#ef4444;text-decoration:line-through}
.check-meta{font-size:10px;color:var(--muted);margin-top:2px}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:8px;vertical-align:middle;margin-left:4px}
.tag-extra{background:#e0e7ff;color:var(--indigo)}

/* SUB-CATEGORY PILLS (on each item) */
.subcat-row{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.subcat-pill{padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;border:1.5px solid var(--border);background:white;cursor:pointer;color:var(--muted);transition:all .1s}
.subcat-pill:hover{border-color:var(--cyan);color:var(--cyan2)}
.subcat-pill.sc-esp{border-color:#7c3aed;background:#ede9fe;color:#7c3aed}
.subcat-pill.sc-gen{border-color:#0369a1;background:#e0f2fe;color:#0369a1}
.subcat-pill.sc-mob{border-color:#b45309;background:#fef3c7;color:#b45309}

/* ITEM CONTROLS */
.item-ctrls{display:flex;align-items:center;gap:5px;flex-shrink:0}
.toggle-vis{width:20px;height:20px;border-radius:5px;border:2px solid #cbd5e1;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.check-item:not(.hidden-item) .toggle-vis{border-color:var(--cyan);background:var(--cyan)}
.toggle-vis .ck{display:none;pointer-events:none}
.check-item:not(.hidden-item) .toggle-vis .ck{display:block}
.btn-rm-grp{width:22px;height:22px;border-radius:5px;border:1.5px solid #fca5a5;background:#fef2f2;color:#ef4444;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.btn-rm-grp:hover{background:#fee2e2;border-color:#ef4444}
.btn-rst-grp{width:22px;height:22px;border-radius:5px;border:1.5px solid #a5b4fc;background:#eef2ff;color:#6366f1;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.btn-rst-grp:hover{background:#e0e7ff;border-color:#6366f1}

/* PICKER MODAL */
.picker-overlay{position:fixed;inset:0;background:rgba(10,22,40,.6);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:60px 20px 20px}
.picker-overlay.open{display:flex}
.picker-modal{background:white;border-radius:16px;width:100%;max-width:560px;max-height:calc(100vh - 100px);display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
.picker-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.picker-title{font-size:15px;font-weight:800;color:var(--text);flex:1}
.picker-close{width:28px;height:28px;border-radius:50%;border:none;background:#f1f5f9;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.picker-search{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.picker-search input{width:100%;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;color:var(--text)}
.picker-search input:focus{border-color:var(--cyan)}
.picker-list{flex:1;overflow-y:auto;padding:8px 0}
.picker-item{padding:9px 16px;display:flex;align-items:center;gap:10px;cursor:default;transition:background .1s}
.picker-item:hover{background:#f0f9ff}
.picker-thumb{width:32px;height:32px;border-radius:6px;background:#f1f5f9;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.picker-thumb img{width:100%;height:100%;object-fit:contain;padding:2px}
.picker-info{flex:1;min-width:0}
.picker-name{font-size:12.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-meta{font-size:10.5px;color:var(--muted);margin-top:1px}
.picker-add-btn{padding:4px 10px;border-radius:6px;border:none;background:var(--indigo);color:white;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .12s}
.picker-add-btn:hover{background:#4338ca}
.picker-empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}

/* ADD GROUP MODAL */
.modal-over{position:fixed;inset:0;background:rgba(10,22,40,.5);z-index:400;display:none;align-items:center;justify-content:center}
.modal-over.open{display:flex}
.modal-box{background:white;border-radius:14px;padding:24px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.modal-box h3{font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px}
.modal-box input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;margin-bottom:12px;color:var(--text)}
.modal-box input:focus{border-color:var(--cyan)}
.modal-box .row{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:7px 16px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted)}
.btn-confirm{padding:7px 16px;border:none;border-radius:7px;background:var(--cyan);color:var(--navy);font-size:12px;font-weight:700;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:white;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}


/* ── LAYOUT FIX ─────────────────────────────────────────── */
.main-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border)}
.search-input{width:100%;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;outline:none;color:var(--text)}
.search-input:focus{border-color:var(--cyan)}
.checklist-panel{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:6px}
.dimmed{opacity:.45}
.check-btn{margin-left:auto;padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);white-space:nowrap}
.check-btn:hover{border-color:var(--cyan);color:var(--cyan)}
</style>
</head>
<body>
<div style="position:fixed;top:0;left:0;right:0;height:44px;background:linear-gradient(135deg,#1a3a5c 0%,#2563eb 100%);display:flex;align-items:center;padding:0 12px;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.2);">
  <a href="index.html" title="Volver al HUB · Hospital del Salvador" style="display:flex;align-items:center;text-decoration:none;margin-right:14px;padding-right:14px;border-right:1.5px solid rgba(255,255,255,0.2);flex-shrink:0;opacity:0.9;transition:opacity .2s,transform .15s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.9'"><img src="Logos HUB-HDS/0.HUB-HDS.png" style="width:32px;height:32px;object-fit:contain;" alt="HUB HDS"></a>
</div>
<div style="height:44px"></div>

<div class="hdr">

  <div class="hdr-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="rgba(74,173,214,0.2)"/><rect x="5" y="5" width="8" height="8" rx="2" fill="#4aadd6"/><rect x="15" y="5" width="8" height="8" rx="2" fill="#4aadd6" opacity=".6"/><rect x="5" y="15" width="8" height="8" rx="2" fill="#4aadd6" opacity=".6"/><rect x="15" y="15" width="8" height="8" rx="2" fill="#4aadd6" opacity=".3"/></svg>
    <div>
      <div class="hdr-title">Equi<em style="font-style:normal;color:var(--cyan)">Box</em> <span style="font-size:14px;font-weight:500;opacity:.6">·</span> <span style="font-size:13px;font-weight:600;color:rgba(232,244,253,.7)">Directorio</span></div>
      <div style="font-size:10px;color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase">Configuración de tipologías visibles</div>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="stat-pill"><span class="stat-n" id="statActive">524</span><span class="stat-l">de 524 activos</span></div>
    <button class="btn-hdr btn-reset" onclick="resetAll()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 1 0 1.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M1 2.5V6h3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Resetear todo
    </button>
    <button class="btn-hdr btn-save" onclick="saveState()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2h6.5L10 3.5V10H2V2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><rect x="3.5" y="6.5" width="5" height="3.5" rx=".5" stroke="currentColor" stroke-width="1.3"/><rect x="3.5" y="2" width="4" height="2.5" rx=".5" stroke="currentColor" stroke-width="1.3"/></svg>
      Guardar cambios
    </button>
    <button class="btn-hdr btn-open" onclick="location.href='2.EquiBox.html'">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Abrir EquiBox
    </button>
  </div>

</div>

<div class="dim-wrap">
  <div class="dim-tab active" onclick="setDim('categoria',this)">Categoría <span class="dim-count">5</span></div>
  <div class="dim-tab" onclick="setDim('tecnologia',this)">Tecnología <span class="dim-count" id="dc-tec">0</span></div>
  <div class="dim-tab" onclick="setDim('servicio',this)">Servicio Clínico <span class="dim-count" id="dc-svc">45</span></div>
  <div style="height:1px;background:#e2e8f0;width:100%;margin:4px 0"></div>
  <div style="font-size:10px;font-weight:700;color:#94a3b8;padding:4px 8px;text-transform:uppercase;letter-spacing:.7px">Asignaciones</div>
  <div class="dim-tab" onclick="setDim('especialidad',this)">Especialidad <span class="dim-count" id="dc-especialidad">0</span></div>
  <div class="dim-tab" onclick="setDim('apoyo',this)">Apoyo Diag. y Terapéutico <span class="dim-count" id="dc-apoyo">0</span></div>
  <div class="dim-tab" onclick="setDim('camas',this)">Camas <span class="dim-count" id="dc-camas">0</span></div>
  <div class="dim-tab" onclick="setDim('admin',this)">Área Administrativa <span class="dim-count" id="dc-admin">0</span></div>
</div>

<div class="main-layout">
  <div class="left-panel">
    <div class="search-wrap">
      <input id="searchBox" class="search-input" type="text" placeholder="Buscar grupo…" oninput="onSearch(event)">
    </div>
    <div id="groupList" class="group-list"></div>
  </div>
  <div class="right-panel">
    <div id="checklist" class="checklist-panel">
      <div class="no-group"><span>Selecciona un grupo</span></div>
    </div>
  </div>
</div>

<div id="toast" class="save-toast"></div>

// ─── CONSTANTS & STATE ─────────────────────────────────────
const SVC_MAP_KEY  = 'equibox_svc_map';
const HIDDEN_KEY   = 'equibox_hidden';
const ASSIGN_KEY   = 'equibox_assignments';
const CUSTOM_KEY   = 'equibox_custom_groups';
const SUBCAT_KEY   = 'equibox_subcats';

const ASSIGNABLE_TABS = [
  { key:'especialidad', label:'Especialidad',              color:'#2563eb', emoji:'🔬' },
  { key:'apoyo',        label:'Apoyo Diag. y Terapéutico', color:'#ea580c', emoji:'🩺' },
  { key:'camas',        label:'Camas',                     color:'#0284c7', emoji:'🛏' },
  { key:'admin',        label:'Área Administrativa',       color:'#64748b', emoji:'🏢' },
];

let hiddenIds    = new Set();
let assignments  = {};
let customGroups = {};
let subcats      = {};
let svcMap       = {};   // { svcName: 'especialidad'|'apoyo'|'camas'|'admin' }

let activeDim    = 'categoria';
let activeGroup  = null;
let searchTerm   = '';

// ─── LOAD / SAVE ──────────────────────────────────────────
function loadState() {
  try { hiddenIds    = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY)||'[]')); }    catch(e){}
  try { assignments  = JSON.parse(localStorage.getItem(ASSIGN_KEY)||'{}'); }             catch(e){}
  try { customGroups = JSON.parse(localStorage.getItem(CUSTOM_KEY)||'{}'); }             catch(e){}
  try { subcats      = JSON.parse(localStorage.getItem(SUBCAT_KEY)||'{}'); }             catch(e){}
  try { svcMap       = JSON.parse(localStorage.getItem(SVC_MAP_KEY)||'{}'); }            catch(e){}
}
function saveState() {
  localStorage.setItem(HIDDEN_KEY,  JSON.stringify([...hiddenIds]));
  localStorage.setItem(ASSIGN_KEY,  JSON.stringify(assignments));
  localStorage.setItem(CUSTOM_KEY,  JSON.stringify(customGroups));
  localStorage.setItem(SUBCAT_KEY,  JSON.stringify(subcats));
  localStorage.setItem(SVC_MAP_KEY, JSON.stringify(svcMap));
  showToast('✔ Cambios guardados');
}
function resetAll() {
  if (!confirm('¿Resetear toda la configuración?')) return;
  [HIDDEN_KEY,ASSIGN_KEY,CUSTOM_KEY,SUBCAT_KEY,SVC_MAP_KEY].forEach(function(k){ localStorage.removeItem(k); });
  hiddenIds=new Set(); assignments={}; customGroups={}; subcats={}; svcMap={};
  activeGroup=null; renderGroups(); updateStats();
}

// ─── KEY DERIVATION ───────────────────────────────────────
function nativeKeys(b, dim) {
  if (dim === 'categoria') return [b.category];
  if (dim === 'tecnologia') return [b.tecnologia || '(Sin tecnología)'];
  if (dim === 'servicio')   return (b.servicios_clinicos && b.servicios_clinicos.length) ? b.servicios_clinicos : ['(Sin servicio)'];
  if (['especialidad','apoyo','camas','admin'].includes(dim)) {
    var svcs = (b.servicios_clinicos||[]).filter(function(svc){ return svcMap[svc]===dim; });
    return svcs.length ? svcs : ['(Sin asignar)'];
  }
  return [];
}
function effectiveKeys(b, dim) {
  var r = new Set(nativeKeys(b, dim));
  var prefix = dim + '::';
  Object.keys(assignments).forEach(function(k) {
    if (!k.startsWith(prefix)) return;
    var g = k.slice(prefix.length);
    var a = assignments[k];
    if (a.extra   && a.extra.includes(b.id))   r.add(g);
    if (a.removed && a.removed.includes(b.id)) r.delete(g);
  });
  return [...r];
}

// ─── GROUP HELPERS ─────────────────────────────────────────
function getAllGroups(dim) {
  var grps = new Map();
  BOXES.filter(function(b){ return !hiddenIds.has(b.id); }).forEach(function(b) {
    effectiveKeys(b, dim).forEach(function(v) {
      if (!grps.has(v)) grps.set(v, []);
      grps.get(v).push(b);
    });
  });
  return grps;
}

// ─── SEARCH ───────────────────────────────────────────────
function onSearch(e) {
  searchTerm = e.target.value.toLowerCase();
  renderGroups();
}

// ─── DIM SWITCH ────────────────────────────────────────────
function setDim(dim, el) {
  activeDim = dim; activeGroup = null; searchTerm = '';
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('.dim-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderGroups();
}

// ─── RENDER GROUP LIST ─────────────────────────────────────
function renderGroups() {
  var grps = getAllGroups(activeDim);
  var panel = document.getElementById('groupList');

  // For 'servicio' dim: show all 45 services from Excel (assignment UI)
  if (activeDim === 'servicio') {
    var svcs = [...grps.keys()].filter(function(k){ return k !== '(Sin servicio)'; }).sort(function(a,b){ return a.localeCompare(b,'es'); });
    var html = '';
    svcs.forEach(function(svc) {
      var curTab = svcMap[svc] || null;
      var tabInfo = curTab ? ASSIGNABLE_TABS.find(function(t){ return t.key===curTab; }) : null;
      var badge = tabInfo
        ? '<span style="background:'+tabInfo.color+';color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">'+tabInfo.emoji+' '+tabInfo.label+'</span>'
        : '<span style="background:#f1f5f9;color:#94a3b8;padding:2px 8px;border-radius:10px;font-size:10px">Sin asignar</span>';
      var active = activeGroup === svc ? ' active' : '';
      var cnt = (grps.get(svc)||[]).length;
      html += '<div class="group-item' + active + '" onclick="selectGroup(\'' + esc(svc) + '\')">'
        + '<div class="group-name">' + svc + ' <span class="group-count">' + cnt + '</span></div>'
        + badge
        + '</div>';
    });
    panel.innerHTML = html || '<div class="no-group"><span>Sin grupos</span></div>';
    if (activeGroup) renderSvcPanel(); else document.getElementById('checklist').innerHTML = '<div class="no-group"><span>Selecciona un servicio</span></div>';
    return;
  }

  // Standard group list
  var keys = [...grps.keys()].filter(function(k){ return k.indexOf('(Sin') !== 0; }).sort(function(a,b){ return a.localeCompare(b,'es'); });
  var term = searchTerm;
  if (term) keys = keys.filter(function(k){ return k.toLowerCase().includes(term); });
  var html = '';
  keys.forEach(function(key) {
    var items = grps.get(key);
    var hidden = 0;
    BOXES.forEach(function(b){ if(hiddenIds.has(b.id) && effectiveKeys(b,activeDim).includes(key)) hidden++; });
    var active = activeGroup === key ? ' active' : '';
    html += '<div class="group-item'+active+'" onclick="selectGroup(\'' + esc(key) + '\')">'
      + '<div class="group-name">'+key+'<span class="group-count">'+items.length+'</span></div>'
      + (hidden ? '<div class="hidden-count">'+hidden+' ocultos</div>' : '')
      + '</div>';
  });
  panel.innerHTML = html || '<div class="no-group"><span>Sin grupos</span></div>';
  if (activeGroup && keys.includes(activeGroup)) renderChecklist();
  else { activeGroup = null; document.getElementById('checklist').innerHTML = '<div class="no-group"><span>Selecciona un grupo</span></div>'; }
}

// ─── SELECT GROUP ──────────────────────────────────────────
function selectGroup(key) {
  activeGroup = key;
  renderGroups();
  if (activeDim === 'servicio') { renderSvcPanel(); }
  else { renderChecklist(); }
}

// ─── RENDER CHECKLIST ──────────────────────────────────────
function renderChecklist() {
  if (!activeGroup) return;
  var grps = getAllGroups(activeDim);
  var items = grps.get(activeGroup) || [];
  var term = searchTerm;
  if (term) items = items.filter(function(b){ return b.name.toLowerCase().includes(term); });
  var NO_IMG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/></svg>';
  var html = items.map(function(b) {
    var isHidden = hiddenIds.has(b.id);
    var th = b.image ? '<img src="'+b.image+'" alt="" onerror="this.style.display=\'none\'">' : NO_IMG;
    return '<div class="check-item'+(isHidden?' dimmed':'')+'">'
      +'<div class="check-thumb">'+th+'</div>'
      +'<div class="check-info"><div class="check-name">'+b.name+'</div>'
      +'<div class="check-meta">'+b.category+'</div></div>'
      +'<button class="check-btn" onclick="toggleHide(\''+b.id+'\',this)">'+(isHidden?'Mostrar':'Ocultar')+'</button>'
      +'</div>';
  }).join('');
  document.getElementById('checklist').innerHTML = html
    || '<div class="no-group"><span>Sin equipos</span></div>';
  document.getElementById('checklist').insertAdjacentHTML('afterbegin',
    '<div class="section-lbl">'+activeGroup+' ('+items.length+')</div>');
}

// ─── SVC ASSIGNMENT PANEL ──────────────────────────────────
function renderSvcPanel() {
  if (activeDim !== 'servicio' || !activeGroup) return;
  var cur   = svcMap[activeGroup] || null;
  var grps  = getAllGroups('servicio');
  var items = grps.get(activeGroup) || [];
  var NO_IMG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/></svg>';

  var btnsHtml = ASSIGNABLE_TABS.map(function(tab){
    var isActive = cur === tab.key;
    var style = 'cursor:pointer;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;'
      +'border:2px solid '+(isActive?tab.color:'#e2e8f0')+';'
      +'background:'+(isActive?tab.color:'white')+';'
      +'color:'+(isActive?'white':'#475569')+';'
      +'transition:all .15s;display:inline-flex;align-items:center;gap:6px';
    return '<button style="'+style+'" onclick="setSvcAssign(\''+esc(activeGroup)+'\',\''+tab.key+'\')">'+tab.emoji+' '+tab.label+'</button>';
  }).join('');

  var clearHtml = cur
    ? '<div style="margin-top:8px"><button class="svc-clear-btn" onclick="setSvcAssign(\''+esc(activeGroup)+'\',null)">✕ Sin asignar</button></div>'
    : '';

  var curTab = cur ? ASSIGNABLE_TABS.find(function(t){ return t.key===cur; }) : null;
  var statusHtml = cur && curTab
    ? '<span style="color:'+curTab.color+'">✔ Asignado → <strong>'+curTab.label+'</strong></span>'
    : '<em style="color:var(--muted)">Sin asignar aún</em>';

  var assignBox = '<div class="svc-assign-box">'
    +'<div class="svc-assign-label">Asignar este servicio a una pestaña:</div>'
    +'<div class="svc-opt-row" style="flex-wrap:wrap;gap:8px">'+btnsHtml+'</div>'
    +clearHtml
    +'<div class="svc-assign-status" style="margin-top:10px">'+statusHtml+'</div>'
    +'</div>';

  var equipList = items.map(function(b) {
    var th = b.image ? '<img src="'+b.image+'" alt="" onerror="this.style.display=\'none\'">' : NO_IMG;
    return '<div class="check-item"><div class="check-thumb">'+th+'</div>'
      +'<div class="check-info"><div class="check-name">'+b.name+'</div>'
      +'<div class="check-meta">'+b.category+'</div></div></div>';
  }).join('');

  document.getElementById('checklist').innerHTML =
    assignBox
    +'<div class="section-lbl">Equipos en este servicio ('+items.length+')</div>'
    +(equipList || '<div class="no-group" style="height:80px"><span>Sin equipos</span></div>');
}

function setSvcAssign(svcName, dimVal) {
  if (!dimVal) { delete svcMap[svcName]; }
  else { svcMap[svcName] = dimVal; }
  renderGroups();
  if (activeDim === 'servicio') renderSvcPanel();
  updateStats();
}

// ─── HIDE/SHOW ─────────────────────────────────────────────
function toggleHide(id, btn) {
  if (hiddenIds.has(id)) { hiddenIds.delete(id); btn.textContent='Ocultar'; btn.closest('.check-item').classList.remove('dimmed'); }
  else { hiddenIds.add(id); btn.textContent='Mostrar'; btn.closest('.check-item').classList.add('dimmed'); }
  updateStats();
}

// ─── UPDATE STATS ──────────────────────────────────────────
function updateStats(){
  document.getElementById('statActive').textContent = BOXES.filter(function(b){ return !hiddenIds.has(b.id); }).length;
  ASSIGNABLE_TABS.forEach(function(tab){
    var el = document.getElementById('dc-'+tab.key);
    if(el) el.textContent = Object.keys(svcMap).filter(function(s){ return svcMap[s]===tab.key; }).length;
  });
  var elS = document.getElementById('dc-svc');
  if(elS){ var sg = getAllGroups('servicio'); sg.delete('(Sin servicio)'); elS.textContent = sg.size; }
}

// ─── ESC HELPER ────────────────────────────────────────────
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ─── TOAST ─────────────────────────────────────────────────
let _tt;
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){ t.classList.remove('show'); },2400); }

// ─── INIT ──────────────────────────────────────────────────
loadState(); updateStats(); renderGroups();

</script>
</body>
</html>
