<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EquiBox – HDS</title>
<link rel="icon" type="image/x-icon" href="Logos%20HUB-HDS/favicon-hds.ico">
<link rel="icon" type="image/png" sizes="256x256" href="Logos%20HUB-HDS/favicon-hds.png">
<link rel="shortcut icon" href="Logos%20HUB-HDS/favicon-hds.ico">
<link rel="apple-touch-icon" href="Logos%20HUB-HDS/favicon-hds-180.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy2:#0d1f3c;--navy3:#112244;
  --cyan:#4aadd6;--cyan2:#1a6b8a;
  --text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --surface:#f8fafc;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}

/* ── HEADER ─────────────────────────── */
.app-header{background:#1D2D5B;border-bottom:1px solid rgba(74,173,214,.2);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:12px}
.header-title{font-size:22px;font-weight:800;color:#e8f4fd;letter-spacing:-.3px}
.header-subtitle{font-size:10px;color:var(--cyan);letter-spacing:1.8px;text-transform:uppercase}
.header-search{flex:1;max-width:420px;position:relative}
.header-search input{width:100%;padding:9px 36px 9px 14px;border:1.5px solid rgba(255,255,255,.15);border-radius:24px;background:rgba(255,255,255,.08);color:#e8f4fd;font-size:14px;outline:none;transition:border .2s}
.header-search input::placeholder{color:rgba(255,255,255,.4)}
.header-search input:focus{border-color:var(--cyan);background:rgba(255,255,255,.12)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:16px;display:none}
.search-clear.visible{display:block}
.header-stats{margin-left:auto;display:flex;gap:16px}
.hstat{text-align:center}
.hstat-n{font-size:18px;font-weight:800;color:var(--cyan)}
.hstat-l{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px}

/* ── FILTER BAR ─────────────────────── */
.filter-label-row{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px}

.results-info{font-size:12px;color:var(--muted);align-self:center;margin-left:auto}

/* ── GRID ───────────────────────────── */
.grid-wrap{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.no-results{text-align:center;padding:60px 20px;color:var(--muted)}

/* ── CARD ───────────────────────────── */
.eq-card{background:white;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.eq-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12);border-color:#cbd5e1}
.card-img-area{position:relative;height:160px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-img-area img{width:100%;height:100%;object-fit:contain;padding:8px;transition:transform .3s}
.eq-card:hover .card-img-area img{transform:scale(1.04)}
.card-no-img{display:flex;flex-direction:column;align-items:center;gap:8px;color:#94a3b8}
.card-no-img svg{opacity:.4}
.card-no-img span{font-size:11px}
.cat-badge{position:absolute;top:8px;left:8px;color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.3px}
.qty-badge{position:absolute;top:8px;right:8px;background:rgba(15,23,42,.75);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}
/* Miniatura de tipología (ícono EMMC) */
.tipo-ico{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.94);border:1px solid #e2e8f0;border-radius:9px;padding:3px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(15,23,42,.12)}
.tipo-ico img{width:24px;height:24px;display:block}
.modal-tipo-ico{width:34px;height:34px;vertical-align:-9px;margin-right:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:2px}
.insumo-badge{position:absolute;bottom:8px;right:8px;background:#f59e0b;color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.card-meta{display:flex;justify-content:space-between;align-items:center;gap:4px;margin-top:auto}
.card-brand{font-size:11px;font-weight:600;color:var(--cyan2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}
.card-model{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%;text-align:right;font-style:italic}
.card-service{display:flex;align-items:center;gap:4px;margin-top:2px}
.card-service svg{flex-shrink:0;opacity:.5}
.card-service span{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}

/* ── MODAL ──────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,22,40,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:18px;max-width:820px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-top{display:flex;gap:0;border-radius:18px 18px 0 0;overflow:hidden}
.modal-img-panel{width:300px;min-width:300px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;padding:16px;position:relative}
.modal-img-panel img{max-width:100%;max-height:260px;object-fit:contain}
.modal-close{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.15);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal-close:hover{background:rgba(0,0,0,.35)}
.modal-info{flex:1;padding:20px 24px}
.modal-cat-badge{display:inline-block;color:white;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.modal-name{font-size:18px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:12px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.modal-field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:2px}
.modal-field span{font-size:13px;font-weight:600;color:var(--text)}
.modal-body{padding:0 24px 24px}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;border-top:1px solid var(--border);padding-top:14px}
.loc-table{width:100%;border-collapse:collapse;font-size:12px}
.loc-table th{text-align:left;padding:6px 10px;background:#f8fafc;color:var(--muted);font-weight:600;font-size:11px;border-bottom:1px solid var(--border)}
.loc-table td{padding:7px 10px;border-bottom:1px solid #f1f5f9;color:var(--text)}
.loc-table tr:last-child td{border-bottom:none}
.loc-qty{font-weight:700;color:var(--cyan2);text-align:center}
.docs-list{display:flex;flex-direction:column;gap:6px}
.doc-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8fafc;border-radius:8px;font-size:12px;color:var(--text);text-decoration:none;transition:background .15s}
.doc-item:hover{background:#e8f5fc;color:var(--cyan2)}
.doc-icon{font-size:14px;flex-shrink:0}
.doc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.no-doc{color:var(--muted);font-size:12px;font-style:italic;padding:8px 0}

/* ── FILTER BAR ─────────────────────── */
.dim-bar { display:flex; align-items:center; gap:6px; padding:10px 20px 0; background:white; border-bottom: none; flex-wrap:wrap; }
.dim-btn { display:inline-flex; align-items:center; gap:5px; padding:8px 20px; border-radius:8px 8px 0 0; font-size:13px; font-weight:700; border:1.5px solid #e2e8f0; border-bottom:none; background:#f8fafc; cursor:pointer; transition:all .15s; color:#64748b; position:relative; bottom:-1px; }
.dim-btn.active { background:white; border-bottom:2px solid white; }
.dim-btn.dim-verde.active   { border-color:#16a34a; color:#16a34a; }
.dim-btn.dim-azul.active    { border-color:#2563eb; color:#2563eb; }
.dim-btn.dim-naranja.active { border-color:#ea580c; color:#ea580c; }
.dim-btn.dim-celeste.active { border-color:#0284c7; color:#0284c7; }
.dim-btn.dim-gris.active    { border-color:#64748b; color:#64748b; }
.dim-btn.dim-verde:hover:not(.active)   { background:#f0fdf4; color:#16a34a; }
.dim-btn.dim-azul:hover:not(.active)    { background:#eff6ff; color:#2563eb; }
.dim-btn.dim-naranja:hover:not(.active) { background:#fff7ed; color:#ea580c; }
.dim-btn.dim-celeste:hover:not(.active) { background:#f0f9ff; color:#0284c7; }
.dim-btn.dim-gris:hover:not(.active)    { background:#f8fafc; color:#64748b; }
.subtab-bar.st-verde   { border-top-color:#16a34a; }
.subtab-bar.st-azul    { border-top-color:#2563eb; }
.subtab-bar.st-naranja { border-top-color:#ea580c; }
.subtab-bar.st-celeste { border-top-color:#0284c7; }
.subtab-bar.st-gris    { border-top-color:#64748b; }
.filter-tab.active.tab-verde   { background:#16a34a; border-color:#16a34a; color:white; }
.filter-tab.active.tab-azul    { background:#2563eb; border-color:#2563eb; color:white; }
.filter-tab.active.tab-naranja { background:#ea580c; border-color:#ea580c; color:white; }
.filter-tab.active.tab-celeste { background:#0284c7; border-color:#0284c7; color:white; }
.filter-tab.active.tab-gris    { background:#64748b; border-color:#64748b; color:white; }
.dim-btn.dim-violeta.active { border-color:#7c3aed; color:#7c3aed; }
.dim-btn.dim-rosa.active    { border-color:#db2777; color:#db2777; }
.dim-btn.dim-violeta:hover:not(.active) { background:#f5f3ff; color:#7c3aed; }
.dim-btn.dim-rosa:hover:not(.active)    { background:#fdf2f8; color:#db2777; }
.dim-btn.dim-ambar.active { border-color:#d97706; color:#b45309; }
.dim-btn.dim-ambar:hover:not(.active) { background:#fffbeb; color:#b45309; }
/* ── Pestaña Revisión manual ── */
.rev-sec{grid-column:1/-1;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 18px;margin-bottom:4px}
.rev-sec h3{margin:0 0 4px;font-size:14px;color:#0f172a;display:flex;align-items:center;gap:8px}
.rev-sec .rev-desc{font-size:12px;color:#64748b;margin-bottom:10px}
.rev-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:12.5px}
.rev-row:last-child{border-bottom:0}
.rev-row.done{opacity:.55}
.rev-row.done .rev-txt{text-decoration:line-through}
.rev-row input[type=checkbox]{margin-top:2px;width:15px;height:15px;accent-color:#16a34a;cursor:pointer;flex-shrink:0}
.rev-row .rev-txt{flex:1;color:#334155}
.rev-row .rev-txt b{color:#0f172a}
.rev-row .rev-nota{font-size:11px;color:#94a3b8;display:block;margin-top:1px}
.rev-pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;background:#fef3c7;color:#b45309;flex-shrink:0}
.rev-pill.ok{background:#dcfce7;color:#15803d}
.dim-divider { display:inline-block; width:1.5px; height:28px; background:#cbd5e1; margin:0 8px 0 4px; border-radius:2px; }
.subtab-bar.st-violeta { border-top-color:#7c3aed; }
.subtab-bar.st-rosa    { border-top-color:#db2777; }
.filter-tab.active.tab-violeta { background:#7c3aed; border-color:#7c3aed; color:white; }
.filter-tab.active.tab-rosa    { background:#db2777; border-color:#db2777; color:white; }
.dim-btn:hover:not(.active) { background:#f0f9ff; color:#1a6b8a; }
.subtab-bar { display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:10px 20px; background:white; border-bottom:1px solid var(--border); border-top:1.5px solid #1a6b8a; }
.cross-bar { display:none; padding:6px 20px 8px 24px; background:#f8fafc; border-bottom:1px solid var(--border); gap:0; flex-direction:column; }
.cross-bar.visible { display:flex; }
.cross-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:3px 0; }
.cross-label { font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.05em; min-width:90px; flex-shrink:0; }
.filter-tab { display:inline-flex; align-items:center; gap:6px; padding:5px 12px 5px 6px; border-radius:20px; border:1.5px solid var(--border); background:white; cursor:pointer; font-size:12px; font-weight:600; color:#475569; transition:all .15s; white-space:nowrap; }
.filter-label { font-size:11px; color:#64748b; font-weight:700; text-transform:uppercase; letter-spacing:.8px; margin-right:4px; }
.filter-tab { display:inline-flex; align-items:center; gap:6px; padding:5px 12px 5px 6px; border-radius:20px; border:1.5px solid var(--border); background:white; cursor:pointer; font-size:12px; font-weight:600; color:#475569; transition:all .15s; white-space:nowrap; }
.filter-tab:hover { border-color:#4aadd6; color:#1a6b8a; background:#f0f9ff; }
.filter-tab.active { border-color:#1a6b8a; background:#e8f5fc; color:#0e4a62; }
.tab-count { background:#e2e8f0; color:#334155; font-weight:800; font-size:10px; padding:1px 6px; border-radius:12px; min-width:22px; text-align:center; transition:all .15s; }
.filter-tab.active .tab-count { background:#1a6b8a; color:white; }
.filter-tab:hover .tab-count { background:#cde9f6; color:#0e4a62; }
.results-info { font-size:12px; color:#64748b; margin-left:auto; }



.filter-tab:hover { border-color:#4aadd6; color:#1a6b8a; background:#f0f9ff; }
.filter-tab.active { border-color:#1a6b8a; background:#e8f5fc; color:#0e4a62; }
.tab-count { background:#e2e8f0; color:#334155; font-weight:800; font-size:10px; padding:1px 6px; border-radius:12px; min-width:22px; text-align:center; }
.filter-tab.active .tab-count { background:#1a6b8a; color:white; }
.filter-tab:hover .tab-count { background:#cde9f6; color:#0e4a62; }
.cross-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 9px 3px 4px; border-radius:14px; border:1.5px solid #e2e8f0; background:white; cursor:pointer; font-size:11px; font-weight:600; color:#64748b; transition:all .15s; white-space:nowrap; }
.cross-chip:hover { border-color:#4aadd6; color:#1a6b8a; background:#f0f9ff; }
.cross-chip.active { border-color:#0f766e; background:#f0fdfa; color:#0f766e; }
.cross-chip.active .chip-count { background:#0f766e; color:white; }
.cross-chip:hover .chip-count { background:#cde9f6; color:#0e4a62; }
.chip-count { background:#e2e8f0; color:#334155; font-weight:800; font-size:9px; padding:1px 5px; border-radius:10px; min-width:18px; text-align:center; }
.results-bar { display:flex; align-items:center; padding:6px 20px; background:white; font-size:12px; color:#94a3b8; border-bottom:1px solid var(--border); }

.modal-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin:0 24px 0;padding-top:4px}
.modal-tab-btn{padding:9px 18px;font-size:12px;font-weight:600;color:#64748b;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:.2px}
.modal-tab-btn.active{color:#1a6b8a;border-bottom-color:#1a6b8a}
.modal-tab-btn:hover:not(.active){color:#1a6b8a;background:#f0f9ff}
.modal-tab-panel{display:none;padding:0 24px 24px}
.modal-tab-panel.active{display:block}
.acc-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.acc-table th{text-align:left;padding:6px 10px;background:#f8fafc;color:#64748b;font-weight:600;font-size:11px;border-bottom:1px solid var(--border)}
.acc-table td{padding:7px 10px;border-bottom:1px solid #f1f5f9;color:var(--text)}
.acc-table tr:last-child td{border-bottom:none}
.acc-table td.acc-cant{text-align:center;font-weight:700;color:#1a6b8a;width:48px}
.svc-dist{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.svc-dist-row{display:grid;grid-template-columns:1fr 40px;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:#f8fafc;border:1px solid #f1f5f9}
.svc-dist-name{color:var(--text);font-weight:600;font-size:11px;letter-spacing:.4px;text-transform:uppercase}
.svc-dist-qty{text-align:right;font-weight:700;color:#1a6b8a;font-size:12px}
.acc-empty{text-align:center;color:#94a3b8;padding:28px;font-size:12px}
.lic-placeholder{text-align:center;padding:36px 24px;color:#94a3b8}
.lic-placeholder svg{display:block;margin:0 auto 10px}


/* ══ WHITE THEME OVERRIDE ══════════════════════════════════ */
:root {
  --inst-blue: #1D2D5B;
  --inst-blue2: #1D2D5B;
  --inst-accent: #29aae2;
}
body { background: #f8fafc !important; }
.app-header { background: #1D2D5B; border-bottom-color: rgba(41,170,226,0.3) !important; }
.header-title { color: #ffffff !important; }
.header-subtitle { color: var(--inst-accent) !important; }
.hstat-n { color: var(--inst-accent) !important; }
.hstat-l { color: rgba(255,255,255,.6) !important; }
.header-search input { border-color: rgba(255,255,255,.2) !important; background: rgba(255,255,255,.1) !important; }





/* ── HUB back full logo ── */
.hub-back {
  display:flex; align-items:center; justify-content:center;
  text-decoration:none; margin-right:18px; flex-shrink:0;
  opacity:0.9; transition:opacity .2s, transform .15s;
  border-right:1px solid rgba(255,255,255,0.18); padding-right:18px;
}
.hub-back:hover { opacity:1; transform:scale(1.03); }


/* ── EETT vs Adjudicado ────────────────────── */
.eett-info-bar{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px;background:#f0f9ff;border-radius:8px;margin-bottom:12px;border:1px solid #cfe8f7}
.eett-info-item{display:flex;flex-direction:column;gap:2px;flex:1 1 140px;min-width:120px}
.eett-info-item .lbl{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.eett-info-item .val{font-size:12px;color:#0f172a;font-weight:700}
.eett-info-item.adj{background:#dcfce7;padding:6px 10px;border-radius:6px;border:1px solid #86efac}
.eett-info-item.adj .lbl{color:#166534}
.eett-info-item.adj .val{color:#14532d}
.adj-block{border:1.5px solid #bfdbfe;background:#f0f7ff;border-radius:10px;padding:12px 14px;margin-bottom:14px}
.adj-block.dual{border-color:#f59e0b;background:#fffbeb}
.adj-head{font-size:13px;font-weight:800;color:#1a6b8a;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.adj-block.dual .adj-head{color:#b45309}
.adj-dual{font-size:10px;font-weight:800;background:#f59e0b;color:#fff;border-radius:10px;padding:2px 9px;letter-spacing:.3px}
.adj-table{width:100%;border-collapse:collapse;font-size:12px}
.adj-table th{background:rgba(255,255,255,.6);text-align:left;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#64748b;border-bottom:1px solid #cbd5e1}
.adj-table td{padding:6px 8px;border-bottom:1px solid #e2e8f0;color:#1e293b}
.adj-table tr:last-child td{border-bottom:none}
.adj-note{font-size:10px;color:#94a3b8;margin-top:7px;font-style:italic}
.eett-variant-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.eett-variant-btn{padding:6px 14px;border:1.5px solid #cbd5e1;background:#fff;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;color:#475569;transition:all .15s}
.eett-variant-btn.active{background:#1a6b8a;color:#fff;border-color:#1a6b8a}
.eett-variant-btn:hover:not(.active){background:#f0f9ff;border-color:#1a6b8a;color:#1a6b8a}
.eett-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
.eett-table th{position:sticky;top:0;background:#1D2D5B;color:#e8f4fd;font-weight:700;font-size:10px;padding:8px 6px;text-align:left;text-transform:uppercase;letter-spacing:.4px;z-index:1}
.eett-table td{padding:8px 8px;border-bottom:1px solid #e2e8f0;vertical-align:top;color:#1e293b;line-height:1.35}
.eett-table tr.eett-section td{background:#dbeafe;font-weight:800;color:#0c4a6e;font-size:11px;letter-spacing:.4px;text-transform:uppercase;padding:7px 8px}
.eett-table tr:not(.eett-section):hover{background:#fafbfd}
.eett-cumple{display:inline-block;font-weight:800;padding:2px 7px;border-radius:10px;font-size:10px;letter-spacing:.4px}
.eett-cumple.yes{background:#dcfce7;color:#166534}
.eett-cumple.no{background:#fee2e2;color:#991b1b}
.eett-cumple.na{background:#f1f5f9;color:#475569}
.eett-num{font-weight:700;color:#64748b;text-align:center;width:32px}
.eett-spec{font-weight:600;color:#0f172a}
.eett-oferta{color:#374151;font-size:11px}
.eett-pag{color:#64748b;font-size:10px;font-style:italic}
.eett-empty{padding:30px 20px;text-align:center;color:#94a3b8}
.eett-empty svg{opacity:.4;margin-bottom:10px}
.eett-empty-title{font-weight:700;color:#64748b;margin-bottom:4px;font-size:13px}
.eett-empty-msg{font-size:11px;color:#94a3b8}
.eett-toggle-row{display:flex;gap:6px;align-items:center;margin:6px 0 10px}
.eett-toggle-row label{font-size:11px;color:#64748b;display:inline-flex;align-items:center;gap:5px;cursor:pointer;padding:4px 8px;border-radius:6px;background:#f1f5f9}
.eett-toggle-row label:hover{background:#e0e7ef}
.eett-toggle-row input{margin:0}

/* ───── Layout simétrico del modal cuando hay geo3D ───── */
.modal-left-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.modal-left-panel .modal-img-panel{width:100%;min-width:0;height:auto;min-height:200px}
.modal-left-panel .modal-info{padding:14px 18px}
.modal-right-panel{flex:1;padding:14px 16px 14px 4px;display:flex;align-items:flex-start;min-width:0}
.modal-right-panel .geo3d-section{margin:0;width:100%}

/* ───── Visualización 3D rotativa de equipamiento ───── */
.geo3d-section{margin-top:18px;background:linear-gradient(135deg,#f8fafc,#eef2f7);border-radius:12px;padding:12px 14px;border:1px solid #cbd5e1}
.geo3d-section-title{font-size:11px;font-weight:700;color:#0f172a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.geo3d-section-title::before{content:"📐";font-size:15px}
.geo3d-wrap{display:flex;flex-direction:column;gap:10px;align-items:center}
.geo3d-scene{perspective:900px;width:200px;height:200px;margin:0 auto;position:relative}
.geo3d-rotator{position:absolute;inset:0;transform-style:preserve-3d;animation:geo3dSpin 20s linear infinite;transform:translateZ(0) rotateX(-18deg) rotateY(0deg)}
@keyframes geo3dSpin{
  0%{transform:rotateX(-18deg) rotateY(0deg)}
  100%{transform:rotateX(-18deg) rotateY(360deg)}
}
.geo3d-scene:hover .geo3d-rotator{animation-play-state:paused}
.geo3d-block{position:absolute;transform-style:preserve-3d;left:50%;top:50%}
.geo3d-face{position:absolute;left:50%;top:50%;background:rgba(59,130,246,.55);border:1.5px solid #1e40af;box-sizing:border-box;backface-visibility:hidden}
.geo3d-block[data-kind="screen"] .geo3d-face{background:rgba(15,23,42,.85);border-color:#0f172a}
.geo3d-block[data-kind="handle"] .geo3d-face{background:rgba(100,116,139,.7);border-color:#334155}
.geo3d-block[data-kind="paddle"] .geo3d-face{background:rgba(239,68,68,.7);border-color:#991b1b}
.geo3d-block[data-kind="accent"] .geo3d-face{background:rgba(16,185,129,.7);border-color:#047857}
.geo3d-axes{margin-top:2px;display:flex;justify-content:center;gap:8px;font-size:9px;font-weight:600;color:#475569}
.geo3d-axes span{display:inline-flex;align-items:center;gap:3px}
.geo3d-axes .ax{width:8px;height:8px;border-radius:2px;display:inline-block}
.geo3d-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%;margin-top:6px}
.geo3d-stat{background:#fff;border-radius:8px;padding:6px 10px;border-left:3px solid var(--c,#3b82f6);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.geo3d-stat .lab{font-size:9px;font-weight:700;text-transform:uppercase;color:#64748b;letter-spacing:.4px}
.geo3d-stat .val{font-size:15px;font-weight:800;color:#0f172a;line-height:1.1;margin-top:1px}
.geo3d-stat .val small{font-size:10px;color:#64748b;font-weight:500;margin-left:3px}
.geo3d-stat.alto{--c:#10b981}
.geo3d-stat.ancho{--c:#3b82f6}
.geo3d-stat.profundidad{--c:#f59e0b}
.geo3d-extras{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.geo3d-extras span{font-size:10px;background:#e0e7ff;color:#3730a3;padding:2px 7px;border-radius:7px;font-weight:600}


.excel-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);display:none;align-items:flex-start;justify-content:center;z-index:300;padding:28px}
.excel-overlay.show{display:flex}
.excel-box{background:#fff;border-radius:12px;width:1340px;max-width:97vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.4)}
.excel-head{background:#1D2D5B;color:#fff;padding:13px 18px;display:flex;align-items:center;gap:12px}
.excel-head h3{font-size:15px;font-weight:800;margin:0;flex:1}
.excel-head input{padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.10);color:#fff;font-size:13px;outline:none;width:230px}
.excel-head .x{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
.excel-body{overflow:auto}
table.excel-tbl{width:100%;border-collapse:collapse;font-size:12px}
table.excel-tbl th{position:sticky;top:0;background:#eef4fb;color:#1D2D5B;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #cbd5e1;white-space:nowrap}
table.excel-tbl thead tr.excel-filter-row th{position:sticky;top:33px;background:#f8fafc;padding:5px 6px;border-bottom:1px solid #cbd5e1}
table.excel-tbl .excel-col-f{width:100%;font-size:11px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:5px;outline:none;font-weight:400;text-transform:none}
table.excel-tbl .excel-col-f:focus{border-color:#1D2D5B}
table.excel-tbl td{padding:6px 10px;border-bottom:1px solid #eef2f7;color:#1e293b;vertical-align:top}
table.excel-tbl tr:nth-child(even) td{background:#f8fafc}
.excel-actions{padding:10px 18px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px}
.excel-actions button{background:#1D2D5B;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer}
</style>
</head>

function getEquipIcon(b) {
  const tec = b.tecnologia;
  if (tec && EQUIP_ICONS[tec]) return EQUIP_ICONS[tec];
  // fallback by name keywords
  const n = (b.name||'').toLowerCase();
  if (n.includes('rayos') || n.includes('angio') || n.includes('tomogra') || n.includes('escaner') || n.includes('pet'))
    return EQUIP_ICONS['Rayos X'];
  if (n.includes('ecogra') || n.includes('ecotomogra') || n.includes('doppler') || n.includes('ecocardio'))
    return EQUIP_ICONS['Ultrasonido'];
  if (n.includes('endos') || n.includes('colonos') || n.includes('gastros') || n.includes('video torre'))
    return EQUIP_ICONS['Endoscopia'];
  if (n.includes('microsco'))
    return EQUIP_ICONS['Microscopios'];
  if (n.includes('ventilad') || n.includes('ventil'))
    return EQUIP_ICONS['Ventilacion'];
  if (n.includes('refrig') || n.includes('congel') || n.includes('crio') || n.includes('temperatura'))
    return EQUIP_ICONS['Refrigeración'];
  if (n.includes('motor') || n.includes('taladro') || n.includes('sierra'))
    return EQUIP_ICONS['Motores'];
  if (n.includes('desfibril') || n.includes('monitor') || n.includes('cardiaco'))
    return EQUIP_ICONS['Desfibriladores'];
  if (n.includes('dispens') || n.includes('armario') || n.includes('carrusel'))
    return EQUIP_ICONS['Dispensacion de Insumos y Medicamentos'];
  if (n.includes('laparos') || n.includes('robot'))
    return EQUIP_ICONS['Laparoscopia'];
  if (n.includes('electro') || n.includes('energia'))
    return EQUIP_ICONS['Plataformas Energia'];
  if (n.includes('carro') || n.includes('transporte') || n.includes('cama'))
    return EQUIP_ICONS['Transporte de material'];
  return EQUIP_ICONS['default'];
}

function _nativeKeysEB(b, dim) {
  if(dim==='categoria') return [b.category];
  if(dim==='tecnologia') return [b.tecnologia||'(Sin tecnología)'];
  if(dim==='servicio') return (b.servicios_clinicos&&b.servicios_clinicos.length)?b.servicios_clinicos:['(Sin servicio)'];
  if(ASSIGNABLE_DIMS.includes(dim)) {
    var svcs = (b.servicios_clinicos||[]).filter(function(svc){ return _svcMapEB[svc]===dim; });
    if(dim==='especialidad'){
      // Especialidad = columna D 'Servicio Clínico 2026' (mapa EQUIBOX_ESPEC_MAP)
      var _cc=String(b.code);
      var _m=(window.EQUIBOX_ESPEC_MAP&&window.EQUIBOX_ESPEC_MAP[_cc])?window.EQUIBOX_ESPEC_MAP[_cc].slice():[];
      // + servicios de especialidad donde el código tiene unidades DESPLEGADAS
      // (Excel de despliegue): la tarjeta debe aparecer en esos grupos también.
      var _d=despCode(_cc);
      if(_d){ Object.keys(_d.servicios).forEach(function(s){
        if(_d.servicios[s]>0 && _ESPEC_SET.has(s) && _m.indexOf(s)<0) _m.push(s);
      }); }
      return _m;
    }
    return svcs.length ? svcs : ['(Sin asignar)'];
  }
  return [];
}
function _effectiveKeysEB(b, dim) {
  const r = new Set(_nativeKeysEB(b, dim));
  Object.keys(_assignmentsEB).forEach(k => {
    if(!k.startsWith(dim+'::')) return;
    const g = k.slice(dim.length+2), a = _assignmentsEB[k];
    if(a.extra   && a.extra.includes(b.id))   r.add(g);
    if(a.removed && a.removed.includes(b.id)) r.delete(g);
  });
  return [...r];
}
function getField(box, dim) { return _effectiveKeysEB(box, dim); }
function matchesDim(box, dim, val) {
  if(val==='all') return true;
  const hidden = _hiddenGroupsEB[dim]||[];
  if(hidden.includes(val)) return false;
  return _effectiveKeysEB(box, dim).includes(val);
}

// ── HELPERS ─────────────────────────────────────────────────────
function titleCase(s) {
  if(!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}
function getSvcQty(svcName) {
  // Distribuido real (despliegue) cuando existe; planificado (locations) si no
  return BOXES.reduce(function(sum, b) {
    var dq = despQty(b.code, svcName);
    if(dq !== null) return sum + dq;
    var loc = (b.locations||[]).find(function(l){ return l.service===svcName; });
    return sum + (loc ? (loc.qty||0) : 0);
  }, 0);
}
function getGroupQty(dim, groupVal) {
  // dim here is just used as dimName (e.g. 'especialidad'), groupVal not used
  var svcs = Object.keys(_svcMapEB).filter(function(svc){ return _svcMapEB[svc]===dim; });
  return BOXES.reduce(function(sum, b) {
    var s=0;
    svcs.forEach(function(svcName){
      var dq = despQty(b.code, svcName);
      if(dq !== null){ s+=dq; return; }
      var loc=(b.locations||[]).find(function(l){ return l.service===svcName; });
      if(loc) s+=loc.qty||0;
    });
    return sum+s;
  }, 0);
}

// ── BUILD SUB-TABS ────────────────────────────────────────────
function buildSubtabs() {
  // Tabs with no data yet — show empty bar
  if (activeDim === 'traslados' || activeDim === 'comodatos' || activeDim === 'revision') {
    document.getElementById('subtabBar').innerHTML = '';
    return;
  }
  var hidden       = new Set(_hiddenGroupsEB[activeDim]||[]);
  var visibleBoxes = BOXES.filter(function(b){ return !_hiddenIds.has(b.id); });
  var color = DIM_COLOR[activeDim]||'verde';
  var tabClass = 'tab-'+color;
  var html = '';

  if (ASSIGNABLE_DIMS.includes(activeDim)) {
    // Sub-tabs = clinical services assigned to this dim
    var svcCounts = {};
    visibleBoxes.forEach(function(b){
      (b.servicios_clinicos||[]).forEach(function(svc){
        if(_svcMapEB[svc]===activeDim){ svcCounts[svc]=(svcCounts[svc]||0)+1; }
      });
    });
    // Especialidad = columna D 'Servicio Clínico 2026' (mapa EQUIBOX_ESPEC_MAP)
    if(activeDim==='especialidad'){
      svcCounts={};
      visibleBoxes.forEach(function(b){
        // Misma pertenencia que el filtro (mapa + despliegue + asignaciones manuales)
        _effectiveKeysEB(b,'especialidad').forEach(function(e){ svcCounts[e]=(svcCounts[e]||0)+1; });
      });
    }
    var svcs = Object.keys(svcCounts).sort(function(a,b){
      if(activeDim==='especialidad' && window.EQUIBOX_ESPEC_ORDER){
        var ia=window.EQUIBOX_ESPEC_ORDER.indexOf(a), ib=window.EQUIBOX_ESPEC_ORDER.indexOf(b);
        if(ia<0)ia=999; if(ib<0)ib=999;
        if(ia!==ib) return ia-ib;
      }
      return a.localeCompare(b,'es');
    });
    svcs.forEach(function(svc){
      if(hidden.has(svc)) return;
      var cnt = svcCounts[svc];
      var lbl = (activeDim==='camas'&&CAMAS_LABELS[svc]) ? CAMAS_LABELS[svc] : titleCase(svc);
      html += '<button class="filter-tab '+tabClass+(activeSub===svc?' active':'')+'" onclick=\'setSub('+JSON.stringify(svc)+',this)\'><span class="tab-count">'+cnt+'</span>'+lbl+'</button>';
    });
    document.getElementById('subtabBar').innerHTML = html;
    return;
  }

  if (activeDim === 'tecnologia') {
    var counts = {};
    visibleBoxes.forEach(function(b){ _effectiveKeysEB(b,'tecnologia').forEach(function(v){ if(!hidden.has(v)) counts[v]=(counts[v]||0)+1; }); });
    (DIM_LISTS.tecnologia||[]).forEach(function(key){
      if(hidden.has(key)||!counts[key]) return;
      html += '<button class="filter-tab '+tabClass+(activeSub===key?' active':'')+'" onclick=\'setSub('+JSON.stringify(key)+',this)\'><span class="tab-count">'+counts[key]+'</span>'+key+'</button>';
    });
    document.getElementById('subtabBar').innerHTML = html;
    return;
  }

  // DEFAULT: categoria
  var counts = {};
  var custom = _customGroupsEB[activeDim]||[];
  visibleBoxes.forEach(function(b){ _effectiveKeysEB(b,activeDim).forEach(function(v){ if(!hidden.has(v)) counts[v]=(counts[v]||0)+1; }); });
  html = '<button class="filter-tab '+tabClass+(activeSub==='all'?' active':'')+'" onclick="setSub(\'all\',this)"><span class="tab-count">'+visibleBoxes.length+'</span>Todas</button>';
  (DIM_LISTS[activeDim]||[]).forEach(function(key){
    if(hidden.has(key)||!counts[key]) return;
    html += '<button class="filter-tab '+tabClass+(activeSub===key?' active':'')+'" onclick=\'setSub('+JSON.stringify(key)+',this)\'><span class="tab-count">'+counts[key]+'</span>'+key+'</button>';
  });
  custom.forEach(function(key){
    if(hidden.has(key)||!counts[key]) return;
    html += '<button class="filter-tab '+tabClass+(activeSub===key?' active':'')+'" onclick=\'setSub('+JSON.stringify(key)+',this)\'><span class="tab-count">'+counts[key]+'</span>'+key+'</button>';
  });
  document.getElementById('subtabBar').innerHTML = html;
}

// ── DESPLIEGUE REAL (Excel "Despliegue EMMC por Recinto") ────────────────────
// Cantidades DISTRIBUIDAS al día de hoy por código y Servicio Clínico 2026.
// Es la fuente para los números por grupo (miniaturas); b.locations queda como
// distribución PLANIFICADA (fallback cuando el código aún no tiene despliegue).
const DESP = window.EQUIBOX_DESPLIEGUE || null;
const DESP_ALIAS = (DESP && DESP.alias) || {};
function despCode(code){ return (DESP && DESP.porCodigo[String(code)]) || null; }
// qty desplegada del código en un servicio (acepta nombre 2026 o antiguo vía alias).
// null = el código no tiene NINGÚN despliegue registrado (usar planificado).
function despQty(code, svcName){
  const d = despCode(code); if(!d) return null;
  if(svcName in d.servicios) return d.servicios[svcName];
  const a = DESP_ALIAS[svcName];
  if(a && (a in d.servicios)) return d.servicios[a];
  return 0;   // el código tiene despliegue, pero no en este servicio
}
function effectiveQty(b) {
  if (ASSIGNABLE_DIMS.includes(activeDim) && activeSub !== 'all') {
    const dq = despQty(b.code, activeSub);
    if(dq !== null) return dq;                                     // distribuido real
    var loc = (b.locations || []).find(function(l){ return l.service === activeSub; });
    return loc ? (loc.qty || 0) : 0;                               // planificado
  }
  return b.qty;
}
// true si el badge de b muestra dato real de despliegue (para el tooltip)
function qtyEsDespliegue(b){
  return ASSIGNABLE_DIMS.includes(activeDim) && activeSub !== 'all' && despQty(b.code, activeSub) !== null;
}

// Visualización 3D de dimensiones (alto · ancho · profundidad)
// Cada equipo: { alto_mm, ancho_mm, profundidad_mm, peso_kg?, blocks[] }
//   blocks: [{kind, w, h, d, x, y, z}] en mm relativos al cuerpo
//   - kind: 'body' | 'screen' | 'handle' | 'paddle' | 'accent'
//   - x/y/z: offset desde el centro del cuerpo (mm)
// ═════════════════════════════════════════════════════════════════
const DIMENSIONS = {
  // Monitor Desfibrilador · Nihon Kohden TEC-5600 (cardiolife)
  '130007': {
    alto_mm: 300, ancho_mm: 320, profundidad_mm: 250, peso_kg: 7.5,
    extras: ['Batería extraíble','Pantalla 7"','Paletas externas con cable'],
    blocks: [
      // 1) Cuerpo principal del monitor
      { kind:'body',   w:320, h:240, d:250, x:0,  y:0,    z:0   },
      // 2) Pantalla LCD frontal embebida (cara delantera del cuerpo)
      { kind:'screen', w:220, h:150, d:6,   x:0,  y:-20,  z:128 },
      // 3) Asa de transporte arriba (centrada)
      { kind:'handle', w:200, h:25,  d:60,  x:0,  y:-132, z:0   }
    ]
  }
};

// Construye una cara de un cubo. Las caras se centran en (50%,50%) y se
// transladan/rotan al lugar exacto para cerrar el sólido sin huecos.
function geo3dFace(w, h, transform){
  return `<div class="geo3d-face" style="width:${w}px;height:${h}px;margin-left:${-w/2}px;margin-top:${-h/2}px;transform:${transform}"></div>`;
}

function renderGeo3D(code){
  const def = DIMENSIONS[code];
  if(!def) return '';
  // Calcular bounding box global incluyendo offsets de cada bloque
  let extX = 0, extY = 0, extZ = 0;
  def.blocks.forEach(b => {
    extX = Math.max(extX, Math.abs(b.x) + b.w/2);
    extY = Math.max(extY, Math.abs(b.y) + b.h/2);
    extZ = Math.max(extZ, Math.abs(b.z) + b.d/2);
  });
  const span = Math.max(extX*2, extY*2, extZ*2);
  const scale = 150 / span; // caben 150 px de los 200 px de la escena

  const blocksHtml = def.blocks.map(b => {
    const w = b.w * scale, h = b.h * scale, d = b.d * scale;
    const x = b.x * scale, y = b.y * scale, z = b.z * scale;
    // 6 caras del cubo. Cada una se posiciona con su transform específico.
    const faces = [
      geo3dFace(w, h, `translateZ(${d/2}px)`),                    // front
      geo3dFace(w, h, `rotateY(180deg) translateZ(${d/2}px)`),    // back
      geo3dFace(d, h, `rotateY( 90deg) translateZ(${w/2}px)`),    // right
      geo3dFace(d, h, `rotateY(-90deg) translateZ(${w/2}px)`),    // left
      geo3dFace(w, d, `rotateX(-90deg) translateZ(${h/2}px)`),    // top  (Y- es arriba en CSS)
      geo3dFace(w, d, `rotateX( 90deg) translateZ(${h/2}px)`)     // bottom
    ].join('');
    return `<div class="geo3d-block" data-kind="${b.kind}" style="transform:translate3d(${x}px,${y}px,${z}px)">${faces}</div>`;
  }).join('');

  return `<div class="geo3d-section">
    <div class="geo3d-section-title">Dimensiones físicas <span style="opacity:.6;font-weight:500;font-size:11px;margin-left:6px">· hover para pausar</span></div>
    <div class="geo3d-wrap">
      <div>
        <div class="geo3d-scene"><div class="geo3d-rotator">${blocksHtml}</div></div>
        <div class="geo3d-axes">
          <span><i class="ax" style="background:#10b981"></i>Alto</span>
          <span><i class="ax" style="background:#3b82f6"></i>Ancho</span>
          <span><i class="ax" style="background:#f59e0b"></i>Profundidad</span>
        </div>
      </div>
      <div class="geo3d-info">
        <div class="geo3d-stat alto"><div class="lab">Alto</div><div class="val">${def.alto_mm}<small>mm</small></div></div>
        <div class="geo3d-stat ancho"><div class="lab">Ancho</div><div class="val">${def.ancho_mm}<small>mm</small></div></div>
        <div class="geo3d-stat profundidad"><div class="lab">Profundidad</div><div class="val">${def.profundidad_mm}<small>mm</small></div></div>
        ${def.peso_kg ? `<div class="geo3d-stat" style="--c:#7c3aed"><div class="lab">Peso</div><div class="val">${def.peso_kg}<small>kg</small></div></div>` : ''}
        ${def.extras && def.extras.length ? `<div class="geo3d-extras">${def.extras.map(e=>`<span>${e}</span>`).join('')}</div>` : ''}
      </div>
    </div>
  </div>`;
}

const PINS_ALL = (window.SHARED_PINS_EMMC && window.SHARED_PINS_EMMC.items_principal) || [];
function _normName(s){ return (s||'').toString().trim().toLowerCase().replace(/\s+/g,' '); }
const _PINS_INDEX = (function(){
  const idx = {};
  for (const p of PINS_ALL){
    const k = _normName(p.nombre);
    if (!idx[k]) idx[k] = [];
    idx[k].push(p);
  }
  return idx;
})();
function pinsForEquipo(name){
  return _PINS_INDEX[_normName(name)] || [];
}
function pinsSummary(items){
  const t = items.length;
  if (!t) return null;
  const byEstado = {}, byEdif = {}, byPiso = {}, byPins = {}, byLugar = {};
  for (const p of items){
    byEstado[p.estado||'—'] = (byEstado[p.estado||'—']||0)+1;
    byEdif[p.edif||'—']     = (byEdif[p.edif||'—']||0)+1;
    byPiso[p.piso||'—']     = (byPiso[p.piso||'—']||0)+1;
    byPins[p.pins||'—']     = (byPins[p.pins||'—']||0)+1;
    byLugar[p.lugar||'—']   = (byLugar[p.lugar||'—']||0)+1;
  }
  return {t, byEstado, byEdif, byPiso, byPins, byLugar};
}

    return `<div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px">

      <div><b style="color:#475569">"${b.name}"</b> no aparece en el despliegue PINS-EMMC actualizado al 22-may-2026.</div>
      <div style="font-size:11px;margin-top:6px">Si el nombre fue cambiado en la matriz, búscalo manualmente.</div>
    </div>`;
  }
  const s = pinsSummary(items);
  const entregados = (s.byPins['SI']||0);
  const pctEntregado = (100*entregados/s.t).toFixed(0);
  const operativos = (s.byEstado['POSICIONADO']||0) + (s.byEstado['CONECTADO-N/A']||0);
  // Tabla de unidades
  const rows = items.slice(0, 200).map(p => `<tr>
    <td style="font-family:monospace;font-size:11px">${p.serie||p.bim||'—'}</td>
    <td>${p.edif} · ${p.piso}</td>
    <td>${p.recinto_zona2||p.recinto_zona||'—'}<div style="font-size:10px;color:#64748b">${p.recinto_cod||''}</div></td>
    <td><span style="display:inline-block;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;color:#fff;background:${_PINS_COL[p.pins]||'#94a3b8'}">${p.pins||'—'}</span></td>
    <td><span style="display:inline-block;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;color:#fff;background:${_ESTADO_COL[p.estado]||'#94a3b8'}">${p.estado||'—'}</span></td>
    <td style="font-size:11px;color:#64748b">${p.lugar||'—'}</td>
  </tr>`).join('');
  const moreRow = items.length > 200 ? `<tr><td colspan="6" style="text-align:center;padding:8px;color:#94a3b8;font-style:italic">Mostrando 200 de ${items.length} unidades</td></tr>` : '';
  return `
    <div class="section-title">Resumen despliegue PINS-EMMC · ${items.length} unidades en matriz</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px">
      <div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border-left:4px solid #3b82f6">
        <div style="font-size:10px;color:#64748b;text-transform:uppercase;font-weight:700">Total unidades</div>
        <div style="font-size:24px;font-weight:800;color:#0f172a">${s.t}</div>
      </div>
      <div style="background:#f0fdf4;border-radius:8px;padding:10px 12px;border-left:4px solid #10b981">
        <div style="font-size:10px;color:#166534;text-transform:uppercase;font-weight:700">PINS Entregado SI</div>
        <div style="font-size:24px;font-weight:800;color:#0f172a">${entregados} <small style="font-size:13px;color:#64748b">${pctEntregado}%</small></div>
      </div>
      <div style="background:#fef3c7;border-radius:8px;padding:10px 12px;border-left:4px solid #f59e0b">
        <div style="font-size:10px;color:#854d0e;text-transform:uppercase;font-weight:700">Posicionados/Conectados</div>
        <div style="font-size:24px;font-weight:800;color:#0f172a">${operativos} <small style="font-size:13px;color:#64748b">${(100*operativos/s.t).toFixed(0)}%</small></div>
      </div>
      <div style="background:#fef2f2;border-radius:8px;padding:10px 12px;border-left:4px solid #dc2626">
        <div style="font-size:10px;color:#991b1b;text-transform:uppercase;font-weight:700">Pendientes</div>
        <div style="font-size:24px;font-weight:800;color:#0f172a">${s.byEstado['PENDIENTE']||0}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:14px">
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px">
        <div style="font-size:11px;font-weight:700;color:#0f172a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">Por estado</div>
        ${Object.entries(s.byEstado).sort((a,b)=>b[1]-a[1]).map(([k,n]) => _bar(k, n, s.t, _ESTADO_COL[k]||'#94a3b8')).join('')}
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px">
        <div style="font-size:11px;font-weight:700;color:#0f172a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">Por edificio</div>
        ${Object.entries(s.byEdif).sort((a,b)=>b[1]-a[1]).map(([k,n]) => _bar(k, n, s.t, '#7c3aed')).join('')}
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px">
        <div style="font-size:11px;font-weight:700;color:#0f172a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">Por piso</div>
        ${Object.entries(s.byPiso).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,n]) => _bar(k, n, s.t, '#0891b2')).join('')}
      </div>
    </div>

    <div class="section-title" style="display:flex;align-items:center;gap:8px">Unidades en despliegue
      <input id="pins-filter" placeholder="filtrar serie/recinto/edif…" style="margin-left:auto;padding:4px 8px;border:1px solid #cbd5e1;border-radius:5px;font-size:11px" oninput="_filterPinsRows(this.value)">
    </div>
    <div style="max-height:380px;overflow:auto;border:1px solid #e2e8f0;border-radius:8px">
      <table class="acc-table" id="pins-table">
        <thead>
          <tr><th>Serie / BIM</th><th>Ubicación</th><th>Recinto</th><th>PINS</th><th>Estado</th><th>Lugar</th></tr>
        </thead>
        <tbody>${rows}${moreRow}</tbody>
      </table>
    </div>`;
}
function _filterPinsRows(q){
  q = (q||'').toLowerCase().trim();
  document.querySelectorAll('#pins-table tbody tr').forEach(r => {
    r.style.display = !q || r.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function switchModalTab(btn, panelId){
  document.querySelectorAll('.modal-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.modal-tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}
function eettSwitchVariant(code, idx){
  const entries = (window._eettCurrentEntries||{})[code] || [];
  const renderFn = (window._eettRenderVariant||{})[code];
  if (!entries.length || !renderFn) return;
  const container = document.getElementById('eett-content-' + code);
  if (!container) return;
  container.innerHTML = renderFn(entries[idx], idx, entries.length);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');modalOpen=null;}
function handleOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── MODO PÚBLICO (consulta) ─────────────────────────────────────────────────
// La copia publicada en la web se genera con PUBLIC_BUILD=true (el deploy lo
// invierte): oculta TODA herramienta de edición y deja solo consulta/filtros.
// Para probar localmente sin desplegar: agregá ?public=1 a la URL.
const PUBLIC_BUILD = true; /*__PUBLIC_FLAG__*/
const PUBLIC = PUBLIC_BUILD || new URLSearchParams(location.search).get('public')==='1';
function applyPublicMode(){
  if(!PUBLIC) return;
  document.body.classList.add('public');
  // Edición de EquiBox = pestaña Revisión (validación interna) + link Directorio.
  document.querySelectorAll('[data-dim="revision"]').forEach(el=>el.remove());
  document.querySelectorAll('a[href="equibox_directorio.html"]').forEach(a=>a.remove());
  if(activeDim==='revision'){ const c=document.querySelector('[data-dim="categoria"]'); if(c) setDim('categoria',c); }
}
// ── FILTRO POR URL · compartir el HUB acotado a un servicio/especialidad ─────
// ?especialidad=OFTALMOLOGIA · ?servicio=UEH · ?dim=camas&sub=UCI
function applyUrlFilter(){
  const q=new URLSearchParams(location.search);
  let dim=q.get('dim'), sub=q.get('sub');
  if(!dim){
    if(q.get('especialidad')){ dim='especialidad'; sub=q.get('especialidad'); }
    else if(q.get('servicio')){ dim='especialidad'; sub=q.get('servicio'); }
    else if(q.get('categoria')){ dim='categoria'; sub=q.get('categoria'); }
    else if(q.get('tecnologia')){ dim='tecnologia'; sub=q.get('tecnologia'); }
  }
  if(!dim) return;
  const btn=document.querySelector('[data-dim="'+dim+'"]'); if(!btn) return;
  setDim(dim,btn);
  if(sub){ const want=sub.trim().toLowerCase();
    const t=[...document.querySelectorAll('#subtabBar .filter-tab')].find(x=>x.textContent.trim().toLowerCase().indexOf(want)>-1);
    if(t) t.click();
  }
}

<div class="excel-overlay" id="excelOverlay" onclick="if(event.target===this)closeExcel()">
  <div class="excel-box">
    <div class="excel-head">
      <h3>📋 Vista Excel · Equipamiento <span id="excelCount" style="font-weight:400;font-size:12px;opacity:.7"></span></h3>
      <input id="excelSearch" placeholder="Buscar en todo…" oninput="applyExcelFilter()">
      <button class="x" onclick="closeExcel()" title="Cerrar">×</button>
    </div>
    <div class="excel-body" id="excelBody"></div>
    <div class="excel-actions"><button onclick="exportExcelCSV()">⬇ Descargar CSV</button></div>
  </div>
</div>
<script>
function openExcel(){ buildExcel(); document.getElementById('excelOverlay').classList.add('show'); }
function closeExcel(){ document.getElementById('excelOverlay').classList.remove('show'); }
function _ex(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
const EXCEL_COLS=['Código','Equipo','Categoría','Cant.','Marca','Modelo','Proveedor','Área'];
function _exRow(b){ return [b.code,b.name,b.category,b.qty,b.brand,b.model,b.provider,b.area]; }
function buildExcel(){
  const rows=(window.BOXES||BOXES||[]).map(b=>'<tr>'+_exRow(b).map((v,i)=>'<td'+(i===3?' style="text-align:center"':'')+'>'+_ex(v)+'</td>').join('')+'</tr>');
  const headRow='<tr>'+EXCEL_COLS.map(c=>'<th>'+c+'</th>').join('')+'</tr>';
  const filterRow='<tr class="excel-filter-row">'+EXCEL_COLS.map((c,i)=>'<th><input type="text" class="excel-col-f" data-col="'+i+'" placeholder="filtrar…" oninput="applyExcelFilter()"></th>').join('')+'</tr>';
  document.getElementById('excelBody').innerHTML='<table class="excel-tbl"><thead>'+headRow+filterRow+'</thead><tbody>'+rows.join('')+'</tbody></table>';
  const c=document.getElementById('excelCount'); if(c) c.textContent=rows.length+' tipologías';
}
function applyExcelFilter(){
  const q=(document.getElementById('excelSearch').value||'').toLowerCase().trim();
  const colFs=[...document.querySelectorAll('#excelBody .excel-col-f')].map(inp=>({i:+inp.dataset.col,v:(inp.value||'').toLowerCase().trim()}));
  document.querySelectorAll('#excelBody tbody tr').forEach(tr=>{
    const cells=tr.children; let ok=!q||tr.textContent.toLowerCase().includes(q);
    if(ok){ for(const f of colFs){ if(f.v && !(cells[f.i]&&cells[f.i].textContent.toLowerCase().includes(f.v))){ok=false;break;} } }
    tr.style.display=ok?'':'none';
  });
}
function exportExcelCSV(){
  const cell=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  let csv=EXCEL_COLS.map(cell).join(',')+'\n';
  (window.BOXES||BOXES||[]).forEach(b=>{ csv+=_exRow(b).map(cell).join(',')+'\n'; });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='EquiBox_equipamiento.csv'; a.click(); URL.revokeObjectURL(a.href);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeExcel(); });
</script>
